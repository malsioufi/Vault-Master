kind = "mobile"
previewPath = "/"
title = "Vault Breaker"
version = "1.0.0"
id = "artifacts/vault-breaker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25748

[services.development]
run = "pnpm --filter @workspace/vault-breaker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vault-breaker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vault-breaker", "run", "serve" ]

[services.env]
PORT = "25748"
BASE_PATH = "/"
